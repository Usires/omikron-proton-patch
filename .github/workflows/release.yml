name: Release

on:
  push:
    tags:
      - 'v*'   # Triggers on v0.1.0, v1.0.0, etc.

jobs:
  build-and-release:
    name: Build DLL and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to create the release.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for changelog generation.

      - name: Install MinGW-w64 i686 toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-i686 \
            binutils-mingw-w64-i686

      - name: Build patch.dll (no install — CI mode)
        run: ./build.sh --ci

      - name: Extract changelog section for this version
        id: changelog
        run: |
          # Extract the section starting at the version header matching
          # the current tag (with or without the leading 'v') and ending
          # at the next version header (or EOF).
          # CHANGELOG.md follows Keep a Changelog format: "## [0.1.0] - DATE".
          TAG="${GITHUB_REF_NAME}"                    # e.g. v0.1.0
          VERSION="${TAG#v}"                          # e.g. 0.1.0
          SECTION=$(awk -v v="${VERSION}" '
            /^## \[/ {
              if (p) exit
              if ($0 ~ "^## \\[" v "\\]") { p=1; print; next }
            }
            p { print }
          ' CHANGELOG.md || true)
          if [ -z "$SECTION" ]; then
            echo "::warning::No CHANGELOG.md section found for ${VERSION}; using default notes."
            SECTION="Release ${TAG}. See CHANGELOG.md for details."
          fi
          {
            echo "section<<EOF"
            echo "$SECTION"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Delete any existing release and assets for this tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Re-running a release workflow on the same tag should overwrite,
          # not pile up. softprops/action-gh-release won't overwrite an
          # existing release, so we delete it first if present.
          EXISTING=$(gh release view "${{ github.ref_name }}" --json id -q '.id' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Deleting existing release ${{ github.ref_name }} (id=$EXISTING) before recreating."
            gh release delete "${{ github.ref_name }}" --yes
          else
            echo "No existing release for ${{ github.ref_name }} — nothing to delete."
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## ${{ github.ref_name }}

            ${{ steps.changelog.outputs.section }}

            ---

            **Asset:** `patch.dll` — drop this next to `Runtime.exe` in your
            Omikron install directory. See the [README](https://github.com/${{ github.repository }}#install)
            for full install instructions.

            Built by GitHub Actions on ubuntu-latest with `gcc-mingw-w64-i686`.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}   # v1.0.0-alpha etc. → prerelease
          files: |
            patch.dll
